<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Social</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
<style>
/* ══════════════════════════════════════
   TEMPLATE BASE (freefrontend)
══════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Poppins:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
a { text-decoration: none; }
li { list-style: none; }

:root {
  --poppins: 'Poppins', sans-serif;
  --lato: 'Lato', sans-serif;
  --light: #F9F9F9;
  --blue: #3C91E6;
  --light-blue: #CFE8FF;
  --grey: #eee;
  --dark-grey: #AAAAAA;
  --dark: #342E37;
  --red: #DB504A;
  --yellow: #FFCE26;
  --light-yellow: #FFF2C6;
  --orange: #FD7238;
  --light-orange: #FFE0D3;
}

html { overflow-x: hidden; }

body.dark {
  --light: #0C0C1E;
  --grey: #060714;
  --dark: #FBFBFB;
}

body { background: var(--grey); overflow-x: hidden; }

/* SIDEBAR */
#sidebar {
  position: fixed;
  top: 0; left: 0;
  width: 220px;
  height: 100%;
  background: var(--light);
  z-index: 2000;
  font-family: var(--lato);
  transition: .3s ease;
  overflow-x: hidden;
  scrollbar-width: none;
}
#sidebar::-webkit-scrollbar { display: none; }
#sidebar.hide { width: 60px; }

#sidebar .brand {
  font-size: 20px;
  font-weight: 700;
  height: 56px;
  display: flex;
  align-items: center;
  color: var(--blue);
  position: sticky;
  top: 0; left: 0;
  background: var(--light);
  z-index: 500;
  padding-bottom: 20px;
  box-sizing: content-box;
  white-space: nowrap;
  overflow: hidden;
}
#sidebar .brand .bx {
  min-width: 60px;
  display: flex;
  justify-content: center;
  font-size: 26px;
}
#sidebar .brand span {
  opacity: 1;
  transition: opacity .2s ease;
}
#sidebar.hide .brand span { opacity: 0; }

#sidebar .side-menu { width: 100%; margin-top: 48px; }
#sidebar .side-menu li {
  height: 48px;
  background: transparent;
  margin-left: 6px;
  border-radius: 48px 0 0 48px;
  padding: 4px;
}
#sidebar .side-menu li.active { background: var(--grey); position: relative; }
#sidebar .side-menu li.active::before {
  content: '';
  position: absolute;
  width: 40px; height: 40px;
  border-radius: 50%;
  top: -40px; right: 0;
  box-shadow: 20px 20px 0 var(--grey);
  z-index: -1;
}
#sidebar .side-menu li.active::after {
  content: '';
  position: absolute;
  width: 40px; height: 40px;
  border-radius: 50%;
  bottom: -40px; right: 0;
  box-shadow: 20px -20px 0 var(--grey);
  z-index: -1;
}
#sidebar .side-menu li a {
  width: 100%;
  height: 100%;
  background: var(--light);
  display: flex;
  align-items: center;
  border-radius: 48px;
  font-size: 16px;
  color: var(--dark);
  white-space: nowrap;
  overflow-x: hidden;
}
#sidebar .side-menu.top li.active a { color: var(--blue); }
#sidebar.hide .side-menu li a {
  width: calc(48px - (4px * 2));
  transition: width .3s ease;
}
#sidebar .side-menu li a .bx {
  min-width: calc(60px - ((4px + 6px) * 2));
  display: flex;
  justify-content: center;
}
#sidebar .side-menu.top li a:hover { color: var(--blue); }
#sidebar .side-menu li a .link-text {
  opacity: 1;
  transition: opacity .2s ease;
}
#sidebar.hide .side-menu li a .link-text { opacity: 0; }

/* CONTENT */
#content {
  position: relative;
  width: calc(100% - 220px);
  left: 220px;
  transition: .3s ease;
}
#sidebar.hide ~ #content {
  width: calc(100% - 60px);
  left: 60px;
}

/* NAVBAR */
#content nav {
  height: 56px;
  background: var(--light);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-family: var(--lato);
  position: sticky;
  top: 0; left: 0;
  z-index: 1000;
}
#content nav::before {
  content: '';
  position: absolute;
  width: 40px; height: 40px;
  bottom: -40px; left: 0;
  border-radius: 50%;
  box-shadow: -20px -20px 0 var(--light);
}
#content nav a { color: var(--dark); }
#content nav .bx.bx-menu { cursor: pointer; color: var(--dark); font-size: 24px; }

/* Month selector na nav */
#content nav .month-wrap {
  margin-right: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
#content nav .month-wrap .month-select {
  height: 36px;
  padding: 0 14px;
  border: none;
  background: var(--grey);
  border-radius: 36px;
  font-family: var(--lato);
  font-size: 14px;
  color: var(--dark);
  outline: none;
  cursor: pointer;
}

/* Dark mode toggle */
#content nav .swith-lm {
  background-color: var(--grey);
  border-radius: 50px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 3px;
  position: relative;
  height: 21px;
  width: 45px;
  transform: scale(1.3);
}
#content nav .swith-lm .ball {
  background-color: var(--blue);
  border-radius: 50%;
  position: absolute;
  top: 2px; left: 2px;
  height: 17px; width: 17px;
  transform: translateX(0px);
  transition: transform 0.2s linear;
}
#content nav .checkbox:checked + .swith-lm .ball { transform: translateX(22px); }
.bxs-moon { color: var(--yellow); }
.bx-sun { color: var(--orange); }
#content nav input.checkbox { display: none; }

/* Profile icon */
#content nav .profile i {
  font-size: 26px;
  color: var(--dark-grey);
  cursor: pointer;
}
#content nav .profile .avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  object-fit: cover;
  cursor: pointer;
  border: 2px solid var(--grey);
  transition: border-color .2s;
}
#content nav .profile .avatar:hover { border-color: var(--blue); }
#content nav .profile { position: relative; }
#content nav .profile .avatar-tooltip {
  position: absolute;
  right: 0;
  top: calc(100% + 8px);
  background: var(--dark);
  color: #fff;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 8px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity .2s;
}
#content nav .profile:hover .avatar-tooltip { opacity: 1; }

/* MAIN */
#content main {
  width: 100%;
  padding: 36px 24px;
  font-family: var(--poppins);
  max-height: calc(100vh - 56px);
  overflow-y: auto;
}
#content main .head-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 32px;
}
#content main .head-title .left h1 {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--dark);
}
#content main .head-title .left .breadcrumb {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}
#content main .head-title .left .breadcrumb li { color: var(--dark-grey); }
#content main .head-title .left .breadcrumb li.active { color: var(--blue); }

/* ══════════════════════════════════════
   DASHBOARD COMPONENTS
══════════════════════════════════════ */

/* Section title */
.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--dark-grey);
  margin-bottom: 14px;
  padding-left: 2px;
}

/* KPI GRID */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}
.kpi-card {
  background: var(--light);
  border-radius: 16px;
  padding: 20px 22px 18px;
  transition: transform .15s, box-shadow .15s;
  display: flex;
  align-items: center;
  gap: 18px;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
.kpi-icon {
  width: 56px; height: 56px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}
.kpi-icon.blue  { background: var(--light-blue);   color: var(--blue); }
.kpi-icon.yellow{ background: var(--light-yellow);  color: var(--yellow); }
.kpi-icon.orange{ background: var(--light-orange);  color: var(--orange); }
.kpi-icon.red   { background: #fde8e8;              color: var(--red); }
.kpi-body { flex: 1; }
.kpi-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--dark-grey);
  margin-bottom: 6px;
}
.kpi-value {
  font-family: var(--poppins);
  font-size: 28px;
  font-weight: 700;
  line-height: 1;
  color: var(--dark);
  letter-spacing: -1px;
}
.kpi-sub {
  font-size: 11px;
  margin-top: 4px;
  color: var(--dark-grey);
}

/* INTERACT GRID */
.interact-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}
.interact-card {
  background: var(--light);
  border-radius: 14px;
  padding: 18px 14px;
  text-align: center;
  transition: transform .15s;
}
.interact-card:hover { transform: translateY(-2px); }
.interact-val {
  font-family: var(--poppins);
  font-size: 24px;
  font-weight: 700;
  color: var(--dark);
  line-height: 1;
}
.interact-lbl {
  font-size: 10px;
  color: var(--dark-grey);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-top: 6px;
}

/* CARD */
.card {
  background: var(--light);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 20px;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--dark);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title i { color: var(--blue); font-size: 20px; }

/* QUALITY GRID */
.quality-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px;
}
.quality-item {
  background: var(--grey);
  border-radius: 12px;
  padding: 18px 16px;
  text-align: center;
}
.quality-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dark-grey);
  margin-bottom: 8px;
}
.quality-value {
  font-family: var(--poppins);
  font-size: 22px;
  font-weight: 700;
  color: var(--dark);
}
.quality-sub { font-size: 10px; color: var(--dark-grey); margin-top: 4px; }

/* PERFORMANCE ROW */
.perf-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--grey);
  font-size: 13px;
}
.perf-row:last-child { border-bottom: none; }
.perf-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.perf-name { flex: 1; font-weight: 600; color: var(--dark); }
.perf-stat { font-size: 12px; color: var(--dark-grey); min-width: 80px; text-align: right; }
.perf-stat strong { color: var(--dark); font-weight: 600; }

/* RANKING */
.ranking { display: flex; flex-direction: column; gap: 10px; }
.rank-card {
  display: flex;
  align-items: center;
  gap: 14px;
  background: var(--grey);
  border-radius: 12px;
  padding: 12px 16px;
  transition: transform .15s;
}
.rank-card:hover { transform: translateX(2px); }
.rank-pos {
  font-family: var(--poppins);
  font-size: 18px;
  font-weight: 700;
  color: var(--dark-grey);
  width: 28px;
  text-align: center;
  flex-shrink: 0;
}
.rank-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 12px; }
.rank-thumb { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.rank-thumb-placeholder { width: 42px; height: 42px; border-radius: 8px; background: var(--grey); border: 1px solid var(--dark-grey); flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: var(--dark-grey); font-size: 20px; }
.rank-text { flex: 1; min-width: 0; }
.rank-id { font-size: 13px; font-weight: 500; color: var(--dark); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
.rank-plat { font-size: 11px; color: var(--dark-grey); margin-top: 1px; }
.rank-stats { display: flex; gap: 16px; flex-shrink: 0; }
.rank-stat { text-align: right; }
.rank-stat-val { font-family: var(--poppins); font-size: 16px; font-weight: 700; color: var(--dark); line-height: 1; }
.rank-stat-lbl { font-size: 9px; color: var(--dark-grey); letter-spacing: .05em; text-transform: uppercase; margin-top: 2px; }

/* CHIPS */
.chip { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
.chip-ig { background: #F3E8E4; color: #8B3A1A; }
.chip-tt { background: #E8E4F0; color: #4527A0; }
.chip-li { background: #E2EBF0; color: #1A4E72; }
.chip-fb { background: #E4E8F0; color: #1A3A72; }

/* TABS */
.tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.tab-btn {
  background: var(--grey);
  border: none;
  border-radius: 20px;
  padding: 6px 16px;
  font-family: var(--poppins);
  font-size: 11px;
  font-weight: 500;
  color: var(--dark-grey);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: .04em;
  transition: all .15s;
}
.tab-btn.active { background: var(--blue); color: #fff; }
.tab-btn:hover:not(.active) { background: #ddd; color: var(--dark); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* AUDIENCE */
.audience-grid {
  display: grid;
  grid-template-columns: 1.3fr 0.9fr 1.1fr;
  gap: 24px;
  align-items: start;
}
.audience-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--dark-grey);
  margin-bottom: 12px;
  font-weight: 600;
}

/* LOADING */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 80px 0;
  color: var(--dark-grey);
  font-size: 14px;
}
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--grey);
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ERROR */
.error-box {
  background: #FEF2F2;
  border: 1px solid #FECACA;
  border-radius: 16px;
  padding: 20px 24px;
  font-size: 14px;
  color: #991B1B;
}

/* FOOTER */
.footer {
  margin-top: 32px;
  padding: 16px 0 8px;
  border-top: 1px solid var(--grey);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--dark-grey);
}

/* RESPONSIVE */
@media screen and (max-width: 768px) {
  #sidebar { width: 200px; }
  #content { width: calc(100% - 60px); left: 200px; }
}
@media screen and (max-width: 576px) {
  #content nav .month-wrap .month-select { max-width: 160px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .audience-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- ══════════════ SIDEBAR ══════════════ -->
<section id="sidebar">
  <a href="#" class="brand">
    <i class='bx bxs-bar-chart-alt-2 bx'></i>
    <span>SocialDash</span>
  </a>
  <ul class="side-menu top">
    <li class="active">
      <a href="#">
        <i class='bx bxs-dashboard'></i>
        <span class="link-text">Dashboard</span>
      </a>
    </li>
    <li>
      <a href="#">
        <i class='bx bxs-bar-chart-square'></i>
        <span class="link-text">Relatórios</span>
      </a>
    </li>
    <li>
      <a href="#">
        <i class='bx bxs-group'></i>

    </li>

  </ul>
  <ul class="side-menu">

      <a href="/configuracoes">
        <i class='bx bxs-cog'></i>

    <li>
      <a href="/logout">
        <i class='bx bx-log-out'></i>
        <span class="link-text">Sair</span>
      </a>
    </li>
  </ul>
</section>

<!-- ══════════════ CONTENT ══════════════ -->
<section id="content">

  <!-- NAV -->
  <nav>
    <i class='bx bx-menu' id="menu-toggle"></i>

    <div class="month-wrap">
      <i class='bx bxs-user-pin' style="color:var(--dark-grey);font-size:18px"></i>
      <select class="month-select" id="client-select" onchange="onClientChange()"></select>
      <i class='bx bx-calendar' style="color:var(--dark-grey);font-size:18px;margin-left:8px"></i>
      <select class="month-select" id="month-select" onchange="loadDashboard()"></select>
    </div>

    <!-- Dark mode -->
    <input type="checkbox" id="switch-mode" class="checkbox">
    <label for="switch-mode" class="swith-lm">
      <i class='bx bx-sun'></i>
      <i class='bx bxs-moon'></i>
      <div class="ball"></div>
    </label>

    <!-- Profile -->
    <div class="profile">
      <i class='bx bxs-user-circle' id="profile-icon"></i>
      <span class="avatar-tooltip" id="profile-name"></span>
    </div>
  </nav>

  <!-- MAIN -->
  <main>
    <div class="head-title">
      <div class="left">
        <h1 id="client-name">Carregando dados…</h1>
        <ul class="breadcrumb">
          <li>Redes Sociais</li>
          <li><i class='bx bx-chevron-right'></i></li>
          <li class="active" id="header-sub">Dashboard</li>
        </ul>
      </div>
    </div>

    <div id="dashboard-content">
      <div class="loading"><div class="spinner"></div> Buscando dados do Notion…</div>
    </div>
  </main>

</section>

<script>
// ── Sidebar toggle ──
document.getElementById('menu-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('hide');
});

// ── Dark mode toggle ──
document.getElementById('switch-mode').addEventListener('change', function() {
  document.body.classList.toggle('dark', this.checked);
});

// ═══════════════════════════════════════
//  DASHBOARD CONFIG
// ═══════════════════════════════════════
const CONFIG = {
  databaseId: "6f5569db26af439d832d6d805aa63dc0",
  clientIdField: "ID CLIENTE",
};

const FIELDS = {
  idCliente:        "ID CLIENTE",
  alcance:          "Alcance",
  atualizadoEm:     "Atualizado em",
  capa:             "Capa",
  cliquesLink:      "Cliques no link",
  comentarios:      "Comentários",
  compartilhamentos:"Compartilhamentos",
  curtidas:         "Curtidas",
  dataColeta:       "Data da coleta",
  engajamentoTotal: "Engajamento total",
  entregaConteudo:  "Entrega de Cont...",
  impressoes:       "Impressões",
  linkPost:         "Link do post",
  plataforma:       "Plataforma",
  salvamentos:      "Salvamentos",
  taxaEngajamento:  "Taxa de engajamento (%)",
  views:            "Views",
  visitasPerfil:    "Visitas ao perfil",
  mesPostagem:      "Mês postagem",
  legenda:          "Conteúdo (métrica)",
  segFaixaEtaria:   "Faixa etária",
  segSexo:          "Distribuição sexo",
  segCidades:       "Top cidades",
  novosSeg:         "Novos seguidores",
  tipoConteudo:     "Tipo de conteúdo",
  horarioPublicacao:"Horário publicação",
  temaCategoria:    "Tema/Categoria",
  ctaPost:          "CTA do post",
  novosSeguidor:    "Novos seguidores post",
  reposts:          "Reposts",
  seguidoresTotais: "Seguidores totais",
};

// ── Meses ──
function populateMonths() {
  const sel = document.getElementById('month-select');
  const months = [
    'Janeiro 2026','Fevereiro 2026','Março 2026','Abril 2026',
    'Maio 2026','Junho 2026','Julho 2026','Agosto 2026',
  ];
  months.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    if (m === 'Abril 2026') o.selected = true;
    sel.appendChild(o);
  });
}

// ── Cliente ──
let CLIENT_ID = new URLSearchParams(window.location.search).get('cliente');

async function populateClients() {
  const res = await fetch('/api/clients');
  if (!res.ok) return;
  const clients = await res.json();
  const sel = document.getElementById('client-select');
  clients.forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.id;
    if (c.id === CLIENT_ID) o.selected = true;
    sel.appendChild(o);
  });
  if (!CLIENT_ID && clients.length) {
    CLIENT_ID = clients[0].id;
    sel.value = CLIENT_ID;
  }
}

function onClientChange() {
  CLIENT_ID = document.getElementById('client-select').value;
  loadDashboard();
}

// ── Notion API ──
async function fetchNotionData(mes) {
  const filter = CLIENT_ID
    ? { and: [
        { property: FIELDS.mesPostagem, select: { equals: mes } },
        { property: FIELDS.idCliente,   select: { equals: CLIENT_ID } },
      ]}
    : { property: FIELDS.mesPostagem, select: { equals: mes } };

  const res = await fetch(`/api/notion`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      databaseId: CONFIG.databaseId,
      filter,
      page_size: 100,
    }),
  });
  if (!res.ok) throw new Error(`Notion API ${res.status}: ${await res.text()}`);
  return (await res.json()).results;
}

// ── Extrair propriedade ──
function prop(page, name) {
  const p = page.properties[name];
  if (!p) return null;
  switch(p.type) {
    case 'number':   return p.number;
    case 'select':   return p.select?.name ?? null;
    case 'url':      return p.url;
    case 'date':     return p.date?.start ?? null;
    case 'formula':  return p.formula?.number ?? p.formula?.string ?? null;
    case 'rich_text':return p.rich_text?.[0]?.plain_text ?? null;
    case 'title':    return p.title?.[0]?.plain_text ?? null;
    case 'relation': return p.relation?.map(r=>r.id) ?? [];
    case 'files':    return p.files?.[0]?.external?.url ?? p.files?.[0]?.file?.url ?? null;
    case 'created_time': return p.created_time;
    case 'last_edited_time': return p.last_edited_time;
    default: return null;
  }
}

// ── Agregação ──
function aggregateData(pages) {
  const posts = pages.map(p => ({
    idCliente:        prop(p, FIELDS.idCliente),
    capa:             prop(p, FIELDS.capa),
    alcance:          prop(p, FIELDS.alcance) ?? 0,
    cliques:          prop(p, FIELDS.cliquesLink) ?? 0,
    comentarios:      prop(p, FIELDS.comentarios) ?? 0,
    compartilhamentos:prop(p, FIELDS.compartilhamentos) ?? 0,
    curtidas:         prop(p, FIELDS.curtidas) ?? 0,
    engajamentoTotal: prop(p, FIELDS.engajamentoTotal) ?? 0,
    impressoes:       prop(p, FIELDS.impressoes) ?? 0,
    linkPost:         prop(p, FIELDS.linkPost),
    plataforma:       prop(p, FIELDS.plataforma) ?? 'Outro',
    salvamentos:      prop(p, FIELDS.salvamentos) ?? 0,
    taxa:             prop(p, FIELDS.taxaEngajamento) ?? 0,
    views:            prop(p, FIELDS.views) ?? 0,
    visitasPerfil:    prop(p, FIELDS.visitasPerfil) ?? 0,
    mesPostagem:      prop(p, FIELDS.mesPostagem),
    legenda:          prop(p, FIELDS.legenda) ?? '',
    tipoConteudo:     prop(p, FIELDS.tipoConteudo) ?? '—',
    horarioPublicacao:prop(p, FIELDS.horarioPublicacao) ?? null,
    temaCategoria:    prop(p, FIELDS.temaCategoria) ?? '—',
    ctaPost:          prop(p, FIELDS.ctaPost) ?? '—',
    novosSeguidor:    prop(p, FIELDS.novosSeguidor) ?? 0,
    reposts:          prop(p, FIELDS.reposts) ?? 0,
  })).map(p => ({
    ...p,
    taxaSalvamento:       p.alcance > 0 ? (p.salvamentos / p.alcance) * 100 : 0,
    taxaComentario:       p.alcance > 0 ? (p.comentarios / p.alcance) * 100 : 0,
    taxaCompartilhamento: p.alcance > 0 ? (p.compartilhamentos / p.alcance) * 100 : 0,
    ratioViewsAlcance:    p.alcance > 0 ? p.views / p.alcance : 0,
  }));

  const sum = (field) => posts.reduce((acc, p) => acc + (p[field]||0), 0);
  const avg = (field) => posts.length ? sum(field)/posts.length : 0;

  return {
    posts,
    totalPosts:         posts.length,
    totalAlcance:       sum('alcance'),
    totalViews:         sum('views'),
    totalEngajamento:   sum('engajamentoTotal'),
    totalCurtidas:      sum('curtidas'),
    totalComentarios:   sum('comentarios'),
    totalCompartilhamentos: sum('compartilhamentos'),
    totalSalvamentos:   sum('salvamentos'),
    totalReposts:       sum('reposts'),
    totalNovosSeguidor: sum('novosSeguidor'),
    taxaMedia:          avg('taxa'),
    idCliente:          posts[0]?.idCliente ?? '—',
    mes:                posts[0]?.mesPostagem ?? '—',
    segFaixaEtaria:     (pages.map(p=>prop(p,FIELDS.segFaixaEtaria)).find(v=>v)) ?? '—',
    segSexo:            (pages.map(p=>prop(p,FIELDS.segSexo)).find(v=>v)) ?? '—',
    segCidades:         (pages.map(p=>prop(p,FIELDS.segCidades)).find(v=>v)) ?? '—',
    novosSeg:           (pages.map(p=>prop(p,FIELDS.novosSeg)).find(v=>v)) ?? 0,
    seguidoresTotais:   (pages.map(p=>prop(p,FIELDS.seguidoresTotais)).find(v=>v)) ?? 0,
    mediaRatioViews:          avg('ratioViewsAlcance'),
    mediaTaxaSalvamento:      avg('taxaSalvamento'),
    mediaTaxaComentario:      avg('taxaComentario'),
    mediaTaxaCompartilhamento:avg('taxaCompartilhamento'),
  };
}

// ── Formatação ──
function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'k';
  return Math.round(n).toString();
}

// ── Post label for rankings ──
function getPostLabel(p) {
  const titulo = (p.legenda || p.idCliente || '—').substring(0, 55);
  const thumb = p.capa
    ? `<img class="rank-thumb" src="${p.capa}" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'rank-thumb-placeholder'}))">`
    : `<div class="rank-thumb-placeholder"><i class='bx bxl-instagram'></i></div>`;
  const label = `<span class="rank-id" title="${titulo}">${titulo}</span><div class="rank-plat">${p.plataforma || '—'}</div>`;
  const inner = `${thumb}<div class="rank-text">${label}</div>`;
  if (p.linkPost) return `<a class="rank-info" href="${p.linkPost}" target="_blank" rel="noopener" style="text-decoration:none">${inner}</a>`;
  return `<div class="rank-info">${inner}</div>`;
}

// ── Top posts por métrica ──
function buildTopPorMetrica(posts, campo, label, count=5) {
  const sorted = [...posts].sort((a,b) => (b[campo]||0) - (a[campo]||0));
  return '<div class="ranking">' + sorted.slice(0, count).map((p,i) => `
    <div class="rank-card">
      <div class="rank-pos">${i+1}</div>
      ${getPostLabel(p)}
      <div class="rank-stats">
        <div class="rank-stat">
          <div class="rank-stat-val">${fmt(p[campo]||0)}</div>
          <div class="rank-stat-lbl">${label}</div>
        </div>
        <div class="rank-stat">
          <div class="rank-stat-val">${(p.taxa||0).toFixed(1)}%</div>
          <div class="rank-stat-lbl">Taxa</div>
        </div>
      </div>
    </div>
  `).join('') + '</div>';
}

// ── Performance por tipo de conteúdo ──
function buildPerformancePorTipo(posts) {
  const tipos = {};
  posts.forEach(p => {
    const t = p.tipoConteudo || 'Não definido';
    if (!tipos[t]) tipos[t] = { engajamento: 0, alcance: 0, views: 0, taxa: 0, count: 0 };
    tipos[t].engajamento += p.engajamentoTotal || 0;
    tipos[t].alcance     += p.alcance || 0;
    tipos[t].views       += p.views || 0;
    tipos[t].taxa        += p.taxa || 0;
    tipos[t].count       += 1;
  });
  const cores = { 'Reels':'#E8593C', 'Carrossel':'#534AB7', 'Foto':'#457B9D', 'Stories':'#2D6A4F' };
  return Object.entries(tipos).map(([tipo, d]) => {
    const taxaMedia = d.count > 0 ? (d.taxa / d.count).toFixed(1) : '0';
    return `<div class="perf-row">
      <div class="perf-dot" style="background:${cores[tipo]||'#888'}"></div>
      <div class="perf-name">${tipo}</div>
      <div class="perf-stat">${d.count} posts</div>
      <div class="perf-stat"><strong>${taxaMedia}%</strong> taxa</div>
      <div class="perf-stat">${fmt(d.alcance)} alcance</div>
    </div>`;
  }).join('');
}

// ── Performance por tema/categoria ──
function buildPerformancePorTema(posts) {
  const temas = {};
  posts.forEach(p => {
    const t = p.temaCategoria || 'Não definido';
    if (!temas[t]) temas[t] = { engajamento: 0, alcance: 0, taxa: 0, count: 0 };
    temas[t].engajamento += p.engajamentoTotal || 0;
    temas[t].alcance     += p.alcance || 0;
    temas[t].taxa        += p.taxa || 0;
    temas[t].count       += 1;
  });
  const cores = { 'Educativo':'#3B82F6', 'Bastidor':'#F59E0B', 'Depoimento':'#10B981', 'Venda':'#EF4444', 'Entretenimento':'#8B5CF6' };
  return Object.entries(temas).map(([tema, d]) => {
    const taxaMedia = d.count > 0 ? (d.taxa / d.count).toFixed(1) : '0';
    return `<div class="perf-row">
      <div class="perf-dot" style="background:${cores[tema]||'#888'}"></div>
      <div class="perf-name">${tema}</div>
      <div class="perf-stat">${d.count} posts</div>
      <div class="perf-stat"><strong>${taxaMedia}%</strong> taxa</div>
      <div class="perf-stat">${fmt(d.alcance)} alcance</div>
    </div>`;
  }).join('');
}

// ── Audience charts ──
function parsePairs(str) {
  if (!str || str === '—') return [];
  return str.split('|').map(s => s.trim()).map(s => {
    const m = s.match(/^(.+?):\s*([\d.,]+)\s*%?$/);
    return m ? { label: m[1].trim(), value: parseFloat(m[2].replace(',','.')) } : null;
  }).filter(Boolean);
}

function buildAgeChart(str) {
  const data = parsePairs(str);
  if (!data.length) return `<div style="color:var(--dark-grey);font-size:12px">Sem dados</div>`;
  const max = Math.max(...data.map(d => d.value));
  return `<div style="display:flex;flex-direction:column;gap:10px">` + data.map(d => `
    <div style="display:flex;align-items:center;gap:10px;font-size:12px">
      <div style="width:42px;color:var(--dark-grey);font-weight:600;font-size:11px">${d.label}</div>
      <div style="flex:1;background:var(--grey);border-radius:4px;height:10px;overflow:hidden">
        <div style="width:${(d.value/max*100).toFixed(1)}%;height:100%;background:var(--blue);border-radius:4px;opacity:0.8"></div>
      </div>
      <div style="width:36px;text-align:right;color:var(--dark);font-weight:600;font-size:11px">${d.value}%</div>
    </div>`).join('') + `</div>`;
}

function buildSexChart(str) {
  const data = parsePairs(str);
  if (!data.length) return `<div style="color:var(--dark-grey);font-size:12px">Sem dados</div>`;
  const colors = ['#3C91E6', '#AAAAAA', '#FD7238'];
  const total = data.reduce((a,b) => a+b.value, 0) || 100;
  let acc = 0;
  const R = 44, C = 2*Math.PI*R;
  const segs = data.map((d,i) => {
    const frac = d.value/total, len = frac*C, off = C - acc*C;
    acc += frac;
    return `<circle cx="60" cy="60" r="${R}" fill="none" stroke="${colors[i%3]}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)"/>`;
  }).join('');
  const legend = data.map((d,i) => `<div style="display:flex;align-items:center;gap:6px;font-size:11px"><span style="width:8px;height:8px;border-radius:2px;background:${colors[i%3]}"></span><span style="color:var(--dark-grey)">${d.label}</span><strong style="margin-left:auto;color:var(--dark)">${d.value}%</strong></div>`).join('');
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:10px"><svg width="120" height="120" viewBox="0 0 120 120">${segs}</svg><div style="width:100%;display:flex;flex-direction:column;gap:4px">${legend}</div></div>`;
}

function buildCitiesChart(str) {
  if (!str || str === '—') return `<div style="color:var(--dark-grey);font-size:12px">Sem dados</div>`;
  const cities = str.split('|').map(s => s.trim()).filter(Boolean);
  return `<div style="display:flex;flex-direction:column;gap:10px">` + cities.map((c,i) => `
    <div style="display:flex;align-items:center;gap:10px;font-size:12px">
      <div style="width:22px;height:22px;border-radius:50%;background:var(--blue);opacity:${1 - i*0.15};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0">${i+1}</div>
      <div style="color:var(--dark);font-weight:400">${c}</div>
    </div>`).join('') + `</div>`;
}

// ── Tabs ──
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.closest('.card');
      group.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      group.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      group.querySelector(`#${btn.dataset.target}`).classList.add('active');
    });
  });
}

// ── Entry point ──
async function loadDashboard() {
  const mes = document.getElementById('month-select').value;
  document.getElementById('dashboard-content').innerHTML =
    '<div class="loading"><div class="spinner"></div> Buscando dados do Notion…</div>';
  try {
    const pages = await fetchNotionData(mes);
if (!pages.length) {
      document.getElementById('dashboard-content').innerHTML =
        '<div class="error-box">Nenhum dado encontrado para este mês. Verifique se o campo "Mês postagem" está preenchido.</div>';
      return;
    }
    const agg = aggregateData(pages);
    renderDashboard(agg);
  } catch(err) {
    document.getElementById('dashboard-content').innerHTML =
      `<div class="error-box"><strong>Erro ao carregar dados</strong><br><br>${err.message}</div>`;
    console.error(err);
  }
}

populateMonths();
async function loadProfile() {
  try {
    const res = await fetch('/api/agency/me');
    if (!res.ok) return;
    const { name, avatarUrl } = await res.json();
    const icon = document.getElementById('profile-icon');
    const tooltip = document.getElementById('profile-name');
    const img = document.createElement('img');
    img.src = avatarUrl;
    img.className = 'avatar';
    img.alt = name;
    img.onerror = () => {}; // mantém o ícone padrão se falhar
    img.onload = () => icon.replaceWith(img);
    if (tooltip) tooltip.textContent = name;
  } catch {}
}

populateClients().then(() => loadDashboard());
loadProfile();
