<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Social</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F5F3;
    --surface: #FFFFFF;
    --ink: #1A1A18;
    --ink2: #6B6860;
    --ink3: #A8A69F;
    --accent: #1A1A18;
    --border: rgba(26,26,24,0.06);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  .header {
    background: var(--ink);
    color: #fff;
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .header-left h1 em { font-style: italic; color: rgba(255,255,255,0.5); }
  .header-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 6px;
    font-weight: 300;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .month-select {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 6px 12px;
    cursor: pointer;
    outline: none;
  }
  .month-select option { background: #1A1A18; color: #fff; }

  /* ── LAYOUT ── */
  .main { padding: 32px 40px 48px; max-width: 1100px; margin: 0 auto; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 12px;
    padding-left: 2px;
  }

  /* ── KPI GRID (Bloco 1) ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .kpi-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px 22px 18px;
    transition: transform .15s;
  }
  .kpi-card:hover { transform: translateY(-2px); }
  .kpi-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 10px;
  }
  .kpi-value {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -1px;
  }
  .kpi-sub {
    font-size: 11px;
    margin-top: 6px;
    color: var(--ink3);
    font-weight: 300;
  }

  /* ── INTERACT GRID (Bloco 2) ── */
  .interact-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(0,1fr));
    gap: 10px;
    margin-bottom: 32px;
  }
  .interact-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px 12px;
    text-align: center;
  }
  .interact-val {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--ink);
    line-height: 1;
  }
  .interact-lbl {
    font-size: 10px;
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-top: 6px;
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 22px 24px 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 18px;
  }

  /* ── QUALITY GRID (Bloco 3) ── */
  .quality-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0,1fr));
    gap: 10px;
  }
  .quality-item {
    background: var(--bg);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .quality-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--ink3);
    margin-bottom: 8px;
  }
  .quality-value {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--ink);
  }
  .quality-sub {
    font-size: 10px;
    color: var(--ink3);
    margin-top: 4px;
  }

  /* ── PERFORMANCE ROW ── */
  .perf-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .perf-row:last-child { border-bottom: none; }
  .perf-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .perf-name { flex: 1; font-weight: 500; color: var(--ink); }
  .perf-stat { font-size: 12px; color: var(--ink2); min-width: 70px; text-align: right; }
  .perf-stat strong { color: var(--ink); font-weight: 500; }

  /* ── RANKING ── */
  .ranking { display: flex; flex-direction: column; gap: 8px; }
  .rank-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--bg);
    border-radius: 10px;
    padding: 12px 16px;
    transition: transform .15s;
  }
  .rank-card:hover { transform: translateX(2px); }
  .rank-pos {
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--ink3);
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .rank-info { flex: 1; min-width: 0; display: flex; align-items: center; gap: 12px; }
  .rank-thumb { width: 42px; height: 42px; border-radius: 8px; object-fit: cover; flex-shrink: 0; background: var(--border); }
  .rank-thumb-placeholder { width: 42px; height: 42px; border-radius: 8px; background: var(--border); flex-shrink: 0; }
  .rank-text { flex: 1; min-width: 0; }
  .rank-id { font-size: 13px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .rank-plat { font-size: 11px; color: var(--ink3); margin-top: 1px; }
  .rank-stats { display: flex; gap: 16px; flex-shrink: 0; }
  .rank-stat { text-align: right; }
  .rank-stat-val { font-family: 'DM Serif Display', serif; font-size: 16px; color: var(--ink); line-height: 1; }
  .rank-stat-lbl { font-size: 9px; color: var(--ink3); letter-spacing: .05em; text-transform: uppercase; margin-top: 2px; }

  /* ── TOP POSTS TABS ── */
  .tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab-btn {
    background: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink3);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: .04em;
    transition: all .15s;
  }
  .tab-btn.active { background: var(--ink); color: #fff; }
  .tab-btn:hover:not(.active) { background: #E8E7E3; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── AUDIENCE ── */
  .audience-grid {
    display: grid;
    grid-template-columns: 1.3fr 0.9fr 1.1fr;
    gap: 24px;
    align-items: start;
  }
  .audience-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--ink3);
    margin-bottom: 12px;
  }

  /* ── CHIP ── */
  .chip {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 20px;
  }
  .chip-ig { background: #F3E8E4; color: #8B3A1A; }
  .chip-tt { background: #E8E4F0; color: #4527A0; }
  .chip-li { background: #E2EBF0; color: #1A4E72; }
  .chip-fb { background: #E4E8F0; color: #1A3A72; }

  /* ── LOADING ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 60px 0;
    color: var(--ink3);
    font-size: 13px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--ink2);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── ERROR ── */
  .error-box {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: var(--radius);
    padding: 20px 24px;
    font-size: 14px;
    color: #991B1B;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--ink3);
  }

  @media (max-width: 700px) {
    .header { padding: 20px 20px 18px; }
    .main { padding: 20px 20px 40px; }
    .kpi-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .interact-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
    .quality-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
    .audience-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1 id="client-name">Carregando <em>dados…</em></h1>
    <div class="header-sub" id="header-sub">Relatório de redes sociais</div>
  </div>
  <div class="header-right">
    <select class="month-select" id="month-select" onchange="loadDashboard()"></select>
  </div>
</div>

<div class="main">
  <div id="dashboard-content">
    <div class="loading"><div class="spinner"></div> Buscando dados do Notion…</div>
  </div>
</div>

<script>
const CONFIG = {
  databaseId: "6f5569db26af439d832d6d805aa63dc0",
  clientIdField: "ID CLIENTE",
};

const FIELDS = {
  idCliente:        "ID CLIENTE",
  alcance:          "Alcance",
  atualizadoEm:     "Atualizado em",
  capa:             "Capa",
  cliquesLink:      "Cliques no link",
  comentarios:      "Comentários",
  compartilhamentos:"Compartilhamentos",
  curtidas:         "Curtidas",
  dataColeta:       "Data da coleta",
  engajamentoTotal: "Engajamento total",
  entregaConteudo:  "Entrega de Cont...",
  impressoes:       "Impressões",
  linkPost:         "Link do post",
  plataforma:       "Plataforma",
  salvamentos:      "Salvamentos",
  taxaEngajamento:  "Taxa de engajamento (%)",
  views:            "Views",
  visitasPerfil:    "Visitas ao perfil",
  mesPostagem:      "Mês postagem",
  legenda:          "Conteúdo (métrica)",
  segFaixaEtaria:   "Faixa etária",
  segSexo:          "Distribuição sexo",
  segCidades:       "Top cidades",
  novosSeg:         "Novos seguidores",
  tipoConteudo:     "Tipo de conteúdo",
  horarioPublicacao:"Horário publicação",
  temaCategoria:    "Tema/Categoria",
  ctaPost:          "CTA do post",
  novosSeguidor:    "Novos seguidores post",
  reposts:          "Reposts",
  seguidoresTotais: "Seguidores totais",
};

// ── Meses ──
function populateMonths() {
  const sel = document.getElementById('month-select');
  const months = [
    'Janeiro 2026','Fevereiro 2026','Março 2026','Abril 2026',
    'Maio 2026','Junho 2026','Julho 2026','Agosto 2026',
  ];
  months.forEach(m => {
    const o = document.createElement('option');
    o.value = m; o.textContent = m;
    if (m === 'Abril 2026') o.selected = true;
    sel.appendChild(o);
  });
}

// ── Notion API ──
async function fetchNotionData(mes) {
  const res = await fetch(`/api/notion`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      databaseId: CONFIG.databaseId,
      filter: { property: FIELDS.mesPostagem, select: { equals: mes } },
      page_size: 100,
    }),
  });
  if (!res.ok) throw new Error(`Notion API ${res.status}: ${await res.text()}`);
  return (await res.json()).results;
}

// ── Extrair propriedade ──
function prop(page, name) {
  const p = page.properties[name];
  if (!p) return null;
  switch(p.type) {
    case 'number':   return p.number;
    case 'select':   return p.select?.name ?? null;
    case 'url':      return p.url;
    case 'date':     return p.date?.start ?? null;
    case 'formula':  return p.formula?.number ?? p.formula?.string ?? null;
    case 'rich_text':return p.rich_text?.[0]?.plain_text ?? null;
    case 'title':    return p.title?.[0]?.plain_text ?? null;
    case 'relation': return p.relation?.map(r=>r.id) ?? [];
    case 'files':    return p.files?.[0]?.external?.url ?? p.files?.[0]?.file?.url ?? null;
    case 'created_time': return p.created_time;
    case 'last_edited_time': return p.last_edited_time;
    default: return null;
  }
}

// ── Agregação ──
function aggregateData(pages) {
  const posts = pages.map(p => ({
    idCliente:        prop(p, FIELDS.idCliente),
    capa:             prop(p, FIELDS.capa),
    alcance:          prop(p, FIELDS.alcance) ?? 0,
    cliques:          prop(p, FIELDS.cliquesLink) ?? 0,
    comentarios:      prop(p, FIELDS.comentarios) ?? 0,
    compartilhamentos:prop(p, FIELDS.compartilhamentos) ?? 0,
    curtidas:         prop(p, FIELDS.curtidas) ?? 0,
    engajamentoTotal: prop(p, FIELDS.engajamentoTotal) ?? 0,
    impressoes:       prop(p, FIELDS.impressoes) ?? 0,
    linkPost:         prop(p, FIELDS.linkPost),
    plataforma:       prop(p, FIELDS.plataforma) ?? 'Outro',
    salvamentos:      prop(p, FIELDS.salvamentos) ?? 0,
    taxa:             prop(p, FIELDS.taxaEngajamento) ?? 0,
    views:            prop(p, FIELDS.views) ?? 0,
    visitasPerfil:    prop(p, FIELDS.visitasPerfil) ?? 0,
    mesPostagem:      prop(p, FIELDS.mesPostagem),
    legenda:          prop(p, FIELDS.legenda) ?? '',
    tipoConteudo:     prop(p, FIELDS.tipoConteudo) ?? '—',
    horarioPublicacao:prop(p, FIELDS.horarioPublicacao) ?? null,
    temaCategoria:    prop(p, FIELDS.temaCategoria) ?? '—',
    ctaPost:          prop(p, FIELDS.ctaPost) ?? '—',
    novosSeguidor:    prop(p, FIELDS.novosSeguidor) ?? 0,
    reposts:          prop(p, FIELDS.reposts) ?? 0,
  })).map(p => ({
    ...p,
    taxaSalvamento:       p.alcance > 0 ? (p.salvamentos / p.alcance) * 100 : 0,
    taxaComentario:       p.alcance > 0 ? (p.comentarios / p.alcance) * 100 : 0,
    taxaCompartilhamento: p.alcance > 0 ? (p.compartilhamentos / p.alcance) * 100 : 0,
    ratioViewsAlcance:    p.alcance > 0 ? p.views / p.alcance : 0,
  }));

  const sum = (field) => posts.reduce((acc, p) => acc + (p[field]||0), 0);
  const avg = (field) => posts.length ? sum(field)/posts.length : 0;

  return {
    posts,
    totalPosts:         posts.length,
    totalAlcance:       sum('alcance'),
    totalViews:         sum('views'),
    totalEngajamento:   sum('engajamentoTotal'),
    totalCurtidas:      sum('curtidas'),
    totalComentarios:   sum('comentarios'),
    totalCompartilhamentos: sum('compartilhamentos'),
    totalSalvamentos:   sum('salvamentos'),
    totalReposts:       sum('reposts'),
    totalNovosSeguidor: sum('novosSeguidor'),
    taxaMedia:          avg('taxa'),
    idCliente:          posts[0]?.idCliente ?? '—',
    mes:                posts[0]?.mesPostagem ?? '—',
    segFaixaEtaria:     (pages.map(p=>prop(p,FIELDS.segFaixaEtaria)).find(v=>v)) ?? '—',
    segSexo:            (pages.map(p=>prop(p,FIELDS.segSexo)).find(v=>v)) ?? '—',
    segCidades:         (pages.map(p=>prop(p,FIELDS.segCidades)).find(v=>v)) ?? '—',
    novosSeg:           (pages.map(p=>prop(p,FIELDS.novosSeg)).find(v=>v)) ?? 0,
    seguidoresTotais:   (pages.map(p=>prop(p,FIELDS.seguidoresTotais)).find(v=>v)) ?? 0,
    mediaRatioViews:          avg('ratioViewsAlcance'),
    mediaTaxaSalvamento:      avg('taxaSalvamento'),
    mediaTaxaComentario:      avg('taxaComentario'),
    mediaTaxaCompartilhamento:avg('taxaCompartilhamento'),
  };
}

// ── Formatação ──
function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M';
  if (n >= 1000) return (n/1000).toFixed(1).replace('.0','') + 'k';
  return Math.round(n).toString();
}

function platformChip(p) {
  const map = { 'Instagram':'chip-ig', 'TikTok':'chip-tt', 'LinkedIn':'chip-li', 'Facebook':'chip-fb' };
  return `<span class="chip ${map[p]||''}">${p}</span>`;
}

// ── Post label for rankings ──
function getPostLabel(p) {
  const titulo = (p.legenda || p.idCliente || '—').substring(0, 55);
  const thumb = p.capa
    ? `<img class="rank-thumb" src="${p.capa}" alt="" loading="lazy" onerror="this.parentElement.querySelector('.rank-thumb')?.remove()">`
    : `<div class="rank-thumb-placeholder"></div>`;
  const label = `<span class="rank-id" title="${titulo}">${titulo}</span><div class="rank-plat">${p.plataforma || '—'}</div>`;
  const inner = `${thumb}<div class="rank-text">${label}</div>`;
  if (p.linkPost) return `<a class="rank-info" href="${p.linkPost}" target="_blank" rel="noopener" style="text-decoration:none">${inner}</a>`;
  return `<div class="rank-info">${inner}</div>`;
}

// ── Top posts por métrica ──
function buildTopPorMetrica(posts, campo, label, count=5) {
  const sorted = [...posts].sort((a,b) => (b[campo]||0) - (a[campo]||0));
  return '<div class="ranking">' + sorted.slice(0, count).map((p,i) => `
    <div class="rank-card">
      <div class="rank-pos">${i+1}</div>
      ${getPostLabel(p)}
      <div class="rank-stats">
        <div class="rank-stat">
          <div class="rank-stat-val">${fmt(p[campo]||0)}</div>
          <div class="rank-stat-lbl">${label}</div>
        </div>
        <div class="rank-stat">
          <div class="rank-stat-val">${(p.taxa||0).toFixed(1)}%</div>
          <div class="rank-stat-lbl">Taxa</div>
        </div>
      </div>
    </div>
  `).join('') + '</div>';
}

// ── Performance por tipo de conteúdo ──
function buildPerformancePorTipo(posts) {
  const tipos = {};
  posts.forEach(p => {
    const t = p.tipoConteudo || 'Não definido';
    if (!tipos[t]) tipos[t] = { engajamento: 0, alcance: 0, views: 0, taxa: 0, count: 0 };
    tipos[t].engajamento += p.engajamentoTotal || 0;
    tipos[t].alcance     += p.alcance || 0;
    tipos[t].views       += p.views || 0;
    tipos[t].taxa        += p.taxa || 0;
    tipos[t].count       += 1;
  });
  const cores = { 'Reels':'#E8593C', 'Carrossel':'#534AB7', 'Foto':'#457B9D', 'Stories':'#2D6A4F' };
  return Object.entries(tipos).map(([tipo, d]) => {
    const taxaMedia = d.count > 0 ? (d.taxa / d.count).toFixed(1) : '0';
    return `<div class="perf-row">
      <div class="perf-dot" style="background:${cores[tipo]||'#888'}"></div>
      <div class="perf-name">${tipo}</div>
      <div class="perf-stat">${d.count} posts</div>
      <div class="perf-stat"><strong>${taxaMedia}%</strong> taxa</div>
      <div class="perf-stat">${fmt(d.alcance)} alcance</div>
    </div>`;
  }).join('');
}

// ── Performance por tema/categoria ──
function buildPerformancePorTema(posts) {
  const temas = {};
  posts.forEach(p => {
    const t = p.temaCategoria || 'Não definido';
    if (!temas[t]) temas[t] = { engajamento: 0, alcance: 0, taxa: 0, count: 0 };
    temas[t].engajamento += p.engajamentoTotal || 0;
    temas[t].alcance     += p.alcance || 0;
    temas[t].taxa        += p.taxa || 0;
    temas[t].count       += 1;
  });
  const cores = { 'Educativo':'#3B82F6', 'Bastidor':'#F59E0B', 'Depoimento':'#10B981', 'Venda':'#EF4444', 'Entretenimento':'#8B5CF6' };
  return Object.entries(temas).map(([tema, d]) => {
    const taxaMedia = d.count > 0 ? (d.taxa / d.count).toFixed(1) : '0';
    return `<div class="perf-row">
      <div class="perf-dot" style="background:${cores[tema]||'#888'}"></div>
      <div class="perf-name">${tema}</div>
      <div class="perf-stat">${d.count} posts</div>
      <div class="perf-stat"><strong>${taxaMedia}%</strong> taxa</div>
      <div class="perf-stat">${fmt(d.alcance)} alcance</div>
    </div>`;
  }).join('');
}

// ── Audience charts ──
function parsePairs(str) {
  if (!str || str === '—') return [];
  return str.split('|').map(s => s.trim()).map(s => {
    const m = s.match(/^(.+?):\s*([\d.,]+)\s*%?$/);
    return m ? { label: m[1].trim(), value: parseFloat(m[2].replace(',','.')) } : null;
  }).filter(Boolean);
}

function buildAgeChart(str) {
  const data = parsePairs(str);
  if (!data.length) return `<div style="color:var(--ink3);font-size:12px">Sem dados</div>`;
  const max = Math.max(...data.map(d => d.value));
  return `<div style="display:flex;flex-direction:column;gap:8px">` + data.map(d => `
    <div style="display:flex;align-items:center;gap:10px;font-size:12px">
      <div style="width:42px;color:var(--ink2);font-weight:500;font-size:11px">${d.label}</div>
      <div style="flex:1;background:var(--border);border-radius:4px;height:10px;overflow:hidden">
        <div style="width:${(d.value/max*100).toFixed(1)}%;height:100%;background:var(--ink);border-radius:4px;opacity:0.7"></div>
      </div>
      <div style="width:36px;text-align:right;color:var(--ink);font-weight:500;font-size:11px">${d.value}%</div>
    </div>`).join('') + `</div>`;
}

function buildSexChart(str) {
  const data = parsePairs(str);
  if (!data.length) return `<div style="color:var(--ink3);font-size:12px">Sem dados</div>`;
  const colors = ['#1A1A18', '#A8A69F', '#D4D3CF'];
  const total = data.reduce((a,b) => a+b.value, 0) || 100;
  let acc = 0;
  const R = 44, C = 2*Math.PI*R;
  const segs = data.map((d,i) => {
    const frac = d.value/total, len = frac*C, off = C - acc*C;
    acc += frac;
    return `<circle cx="60" cy="60" r="${R}" fill="none" stroke="${colors[i%3]}" stroke-width="16" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)"/>`;
  }).join('');
  const legend = data.map((d,i) => `<div style="display:flex;align-items:center;gap:6px;font-size:11px"><span style="width:8px;height:8px;border-radius:2px;background:${colors[i%3]}"></span><span style="color:var(--ink2)">${d.label}</span><strong style="margin-left:auto;color:var(--ink)">${d.value}%</strong></div>`).join('');
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:10px"><svg width="120" height="120" viewBox="0 0 120 120">${segs}</svg><div style="width:100%;display:flex;flex-direction:column;gap:4px">${legend}</div></div>`;
}

function buildCitiesChart(str) {
  if (!str || str === '—') return `<div style="color:var(--ink3);font-size:12px">Sem dados</div>`;
  const cities = str.split('|').map(s => s.trim()).filter(Boolean);
  return `<div style="display:flex;flex-direction:column;gap:8px">` + cities.map((c,i) => `
    <div style="display:flex;align-items:center;gap:10px;font-size:12px">
      <div style="width:20px;height:20px;border-radius:50%;background:var(--ink);opacity:${1 - i*0.15};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:10px;flex-shrink:0">${i+1}</div>
      <div style="color:var(--ink);font-weight:400">${c}</div>
    </div>`).join('') + `</div>`;
}

// ── Tabs ──
function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const group = btn.closest('.card');
      group.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      group.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      group.querySelector(`#${btn.dataset.target}`).classList.add('active');
    });
  });
}

// ── Entry point ──
async function loadDashboard() {
  const mes = document.getElementById('month-select').value;
  document.getElementById('dashboard-content').innerHTML =
    '<div class="loading"><div class="spinner"></div> Buscando dados do Notion…</div>';
  try {
    const pages = await fetchNotionData(mes);
    if (!pages.length) {
      document.getElementById('dashboard-content').innerHTML =
        '<div class="error-box">Nenhum dado encontrado para este mês. Verifique se o campo "Mês postagem" está preenchido.</div>';
      return;
    }
    const agg = aggregateData(pages);
    document.getElementById('client-name').innerHTML = `${agg.idCliente} — <em>${mes}</em>`;
    renderDashboard(agg);
  } catch(err) {
    document.getElementById('dashboard-content').innerHTML =
      `<div class="error-box"><strong>Erro ao carregar dados</strong><br><br>${err.message}</div>`;
    console.error(err);
  }
}

populateMonths();
loadDashboard();
