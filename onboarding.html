<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar — SocialDash</title>
<link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 52px 44px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.3);
    text-align: center;
  }
  .logo {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #3C91E6, #6c63ff);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
  }
  .logo i { font-size: 36px; color: #fff; }
  h1 { font-size: 26px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 36px; line-height: 1.6; }

  .btn-facebook {
    width: 100%;
    height: 52px;
    background: #1877F2;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-decoration: none;
    transition: background .2s, transform .1s;
  }
  .btn-facebook:hover { background: #166FE5; transform: translateY(-1px); }
  .btn-facebook:active { transform: translateY(0); }
  .btn-facebook i { font-size: 22px; }

  .alert {
    background: #fff0f0;
    color: #c0392b;
    border: 1px solid #f5c6c6;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: left;
  }

  .footer {
    margin-top: 28px;
    font-size: 12px;
    color: #bbb;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><i class='bx bxs-bar-chart-alt-2'></i></div>
  <h1>SocialDash</h1>
  <p class="subtitle">Conecte sua conta do Facebook para acessar o dashboard de métricas do Instagram.</p>

  <div id="erro-box" class="alert" style="display:none"></div>

  <a href="/auth/instagram" class="btn-facebook">
    <i class='bx bxl-facebook'></i>
    Entrar com Facebook
  </a>

  <p class="footer">Suas credenciais são protegidas e nunca compartilhadas.</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const erro = params.get('erro');
  if (erro) {
    const box = document.getElementById('erro-box');
    box.textContent = decodeURIComponent(erro);
    box.style.display = 'block';
  }
</script>
</body>
</html>
