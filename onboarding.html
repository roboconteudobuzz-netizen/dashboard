<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conectar Instagram — BuzzMedia Dashboard</title>
<link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container {
    background: #fff;
    border-radius: 20px;
    padding: 48px 40px;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .logo {
    font-size: 48px;
    color: #3C91E6;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 24px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 8px;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 36px;
    line-height: 1.5;
  }
  .form-group {
    text-align: left;
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #444;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    height: 44px;
    padding: 0 14px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    font-size: 14px;
    color: #333;
    outline: none;
    transition: border .2s;
    background: #fafafa;
  }
  input:focus { border-color: #3C91E6; background: #fff; }

  .btn {
    width: 100%;
    height: 48px;
    background: #3C91E6;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background .2s;
    margin-top: 8px;
  }
  .btn:hover { background: #2d7dd2; }
  .btn:disabled { background: #aaa; cursor: not-allowed; }
  .btn i { font-size: 20px; }

  .divider {
    border: none;
    border-top: 1px solid #eee;
    margin: 32px 0;
  }

  .connected-title {
    font-size: 13px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .05em;
    margin-bottom: 16px;
    text-align: left;
  }
  .client-list { text-align: left; }
  .client-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #f0f9f4;
    border-radius: 10px;
    margin-bottom: 8px;
    font-size: 13px;
    color: #2d6a4f;
    font-weight: 500;
  }
  .client-item i { font-size: 18px; }
  .empty { font-size: 13px; color: #aaa; text-align: left; }

  /* ── Mapping step ── */
  .mapping-card {
    background: #f8faff;
    border: 1px solid #e0ecff;
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 14px;
    text-align: left;
  }
  .mapping-card .page-name {
    font-size: 14px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mapping-card .page-name i { color: #3C91E6; font-size: 18px; }
  .mapping-card .page-id {
    font-size: 11px;
    color: #aaa;
    margin-bottom: 12px;
  }
  .mapping-card label {
    font-size: 12px;
    color: #666;
    margin-bottom: 4px;
  }

  .alert {
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 20px;
    text-align: left;
  }
  .alert-error { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6c6; }
  .alert-success { background: #f0fff4; color: #276749; border: 1px solid #b7ebc8; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="logo"><i class='bx bxs-bar-chart-alt-2'></i></div>
  <div id="content">Carregando...</div>
</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const step    = params.get('step');
  const token   = params.get('token');
  const erro    = params.get('erro');

  async function init() {
    if (step === 'mapping' && token) {
      renderMapping();
    } else {
      renderHome();
    }
  }

  /* ── Tela inicial ── */
  function renderHome() {
    document.getElementById('content').innerHTML = `
      <h1>Conectar Instagram</h1>
      <p class="subtitle">Autorize o acesso ao Instagram da sua conta para que o dashboard colete as métricas automaticamente.</p>

      ${erro ? `<div class="alert alert-error"><i class='bx bx-error-circle'></i> ${decodeURIComponent(erro)}</div>` : ''}

      <button class="btn" onclick="conectar()">
        <i class='bx bxl-instagram'></i>
        Conectar com Instagram
      </button>

      <hr class="divider">

      <div class="connected-title">Contas conectadas</div>
      <div class="client-list" id="client-list">
        <div class="empty">Carregando...</div>
      </div>
    `;
    loadClients();
  }

  async function conectar() {
    window.location.href = '/auth/instagram';
  }

  async function loadClients() {
    try {
      const res = await fetch('/api/clients');
      const clients = await res.json();
      const list = document.getElementById('client-list');
      if (!clients.length) {
        list.innerHTML = '<div class="empty">Nenhuma conta conectada ainda.</div>';
        return;
      }
      list.innerHTML = clients.map(c => `
        <div class="client-item">
          <i class='bx bxs-check-circle'></i>
          <span><strong>${c.id}</strong> — ${c.name}</span>
        </div>
      `).join('');
    } catch {
      const list = document.getElementById('client-list');
      if (list) list.innerHTML = '<div class="empty">Erro ao carregar clientes.</div>';
    }
  }

  /* ── Tela de mapeamento ── */
  async function renderMapping() {
    document.getElementById('content').innerHTML = `
      <h1>Mapear páginas</h1>
      <p class="subtitle">Encontramos as páginas abaixo vinculadas à sua conta. Informe o ID de cada cliente no Notion para conectá-las.</p>
      <div id="pages-list"><div class="empty">Buscando páginas...</div></div>
      <button class="btn" id="btn-save" onclick="saveMapping()" style="margin-top:8px" disabled>
        <i class='bx bx-save'></i> Salvar mapeamento
      </button>
    `;

    let pages;
    try {
      const res = await fetch(`/api/pending?token=${token}`);
      if (!res.ok) throw new Error('Token inválido ou expirado.');
      pages = await res.json();
    } catch (e) {
      document.getElementById('pages-list').innerHTML =
        `<div class="alert alert-error">${e.message} <a href="/onboarding">Tentar novamente</a></div>`;
      return;
    }

    if (!pages.length) {
      document.getElementById('pages-list').innerHTML =
        '<div class="empty">Nenhuma página encontrada.</div>';
      return;
    }

    document.getElementById('pages-list').innerHTML = pages.map((p, i) => `
      <div class="mapping-card">
        <div class="page-name"><i class='bx bxl-facebook-circle'></i>${p.pageName}</div>
        <div class="page-id">Instagram ID: ${p.instagramAccountId}</div>
        <label for="notion_${i}">ID do cliente no Notion</label>
        <input type="text" id="notion_${i}" data-page-id="${p.pageId}"
               placeholder="Ex: NAH-01, PETROMASTER..." />
      </div>
    `).join('');

    document.getElementById('btn-save').disabled = false;
  }

  async function saveMapping() {
    const inputs = document.querySelectorAll('#pages-list input[data-page-id]');
    const mappings = [];
    inputs.forEach(inp => {
      mappings.push({ pageId: inp.dataset.pageId, notionClientId: inp.value.trim() });
    });

    if (mappings.every(m => !m.notionClientId)) {
      alert('Informe pelo menos um ID de cliente no Notion.');
      return;
    }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.innerHTML = '<i class="bx bx-loader-alt bx-spin"></i> Salvando...';

    try {
      const res = await fetch('/api/confirm-mapping', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, mappings }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro ao salvar');

      document.getElementById('content').innerHTML = `
        <div class="logo"><i class='bx bxs-check-circle' style="color:#27ae60"></i></div>
        <h1>Tudo pronto!</h1>
        <p class="subtitle">${data.saved} conta(s) conectada(s) com sucesso. O dashboard já pode coletar as métricas.</p>
        <a href="/onboarding" class="btn" style="text-decoration:none;margin-top:8px">
          <i class='bx bx-arrow-back'></i> Voltar ao início
        </a>
      `;
    } catch (e) {
      btn.disabled = false;
      btn.innerHTML = '<i class="bx bx-save"></i> Salvar mapeamento';
      alert('Erro: ' + e.message);
    }
  }

  init();
</script>
</body>
</html>
